<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live AI Translator</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #38bdf8;
    --accent-stop: #f43f5e;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --good: #4ade80;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }
  h1 { font-size: 1.4rem; margin: 8px 0 4px; }
  p.sub { color: var(--muted); margin: 0 0 18px; font-size: 0.9rem; text-align: center; max-width: 640px; }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 10px;
  }
  select {
    background: var(--card);
    color: var(--text);
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 1rem;
    max-width: 60vw;
  }
  button {
    border: none;
    border-radius: 999px;
    padding: 14px 28px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    color: #03121f;
    background: var(--accent);
    transition: transform .05s ease, background .2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  button:active { transform: scale(0.97); }
  button.listening { background: var(--accent-stop); color: #fff; }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: currentColor; }
  button.listening .dot { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }

  /* mic level meter */
  .meter-wrap { width: 100%; max-width: 760px; margin: 8px 0 16px; }
  .meter-label { font-size:.72rem; color: var(--muted); margin-bottom:4px; display:flex; justify-content:space-between; }
  .meter { height: 10px; background: #0b1220; border:1px solid #334155; border-radius: 999px; overflow:hidden; }
  #meterBar { height:100%; width:0%; background: linear-gradient(90deg, var(--good), #fbbf24, #f43f5e); transition: width .06s linear; }

  .panel {
    width: 100%;
    max-width: 760px;
    background: var(--card);
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 20px;
  }
  .label {
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #detected { color: var(--accent); font-weight: 600; text-transform: none; letter-spacing: 0; }
  #english { font-size: 1.5rem; line-height: 1.5; min-height: 2.2em; white-space: pre-wrap; }
  #english .interim { color: var(--muted); }
  #original { margin-top: 6px; font-size: 1rem; color: var(--muted); white-space: pre-wrap; min-height: 1.4em; }
  #original .interim { color: #64748b; }
  #status { margin-top: 14px; font-size: .85rem; color: var(--muted); min-height: 1.2em; text-align: center; }
  .row2 { display:flex; gap:8px; margin-top:16px; padding-top:14px; border-top:1px solid #334155; }
  .ghost { background: transparent; border:1px solid #334155; color: var(--text); padding:8px 16px; font-size:.85rem; }
  .warn { color: #fbbf24; }
  .err { color: #fb7185; }
</style>
</head>
<body>
  <h1>🎙️ Live AI Translator</h1>
  <p class="sub">Press <b>Translate</b>, then speak or point your mic at the speaker. English streams in live below. Pick the spoken language for the most accurate transcription. Best in Chrome or Edge.</p>

  <div class="controls">
    <select id="srcLang" title="Language being spoken (for transcription accuracy)"></select>
    <button id="toggle"><span class="dot"></span><span id="btnLabel">Translate</span></button>
  </div>

  <div class="meter-wrap">
    <div class="meter-label"><span>Microphone level</span><span id="meterHint">idle</span></div>
    <div class="meter"><div id="meterBar"></div></div>
  </div>

  <div class="panel">
    <div class="label"><span>English</span><span id="detected"></span></div>
    <div id="english"></div>
    <div class="label" style="margin-top:18px">Heard (original)</div>
    <div id="original"></div>
    <div class="row2">
      <button class="ghost" id="copyBtn">Copy English</button>
      <button class="ghost" id="clearBtn">Clear</button>
    </div>
  </div>
  <div id="status"></div>

<script>
// ---- Language list (BCP-47 codes Chrome speech recognition accepts) ----
const LANGS = [
  ["auto","🌐 Auto-detect (best effort)"],
  ["af-ZA","Afrikaans"],["sq-AL","Albanian"],["am-ET","Amharic"],["ar-SA","Arabic"],
  ["hy-AM","Armenian"],["az-AZ","Azerbaijani"],["eu-ES","Basque"],["bn-BD","Bengali"],
  ["bs-BA","Bosnian"],["bg-BG","Bulgarian"],["my-MM","Burmese"],["ca-ES","Catalan"],
  ["zh-CN","Chinese (Mandarin, Simplified)"],["zh-TW","Chinese (Mandarin, Traditional)"],
  ["zh-HK","Chinese (Cantonese)"],["hr-HR","Croatian"],["cs-CZ","Czech"],["da-DK","Danish"],
  ["nl-NL","Dutch"],["en-US","English (US)"],["en-GB","English (UK)"],["en-IN","English (India)"],
  ["et-EE","Estonian"],["fil-PH","Filipino"],["fi-FI","Finnish"],["fr-FR","French"],
  ["fr-CA","French (Canada)"],["gl-ES","Galician"],["ka-GE","Georgian"],["de-DE","German"],
  ["el-GR","Greek"],["gu-IN","Gujarati"],["he-IL","Hebrew"],["hi-IN","Hindi"],["hu-HU","Hungarian"],
  ["is-IS","Icelandic"],["id-ID","Indonesian"],["it-IT","Italian"],["ja-JP","Japanese"],
  ["jv-ID","Javanese"],["kn-IN","Kannada"],["kk-KZ","Kazakh"],["km-KH","Khmer"],["ko-KR","Korean"],
  ["lo-LA","Lao"],["lv-LV","Latvian"],["lt-LT","Lithuanian"],["mk-MK","Macedonian"],
  ["ms-MY","Malay"],["ml-IN","Malayalam"],["mr-IN","Marathi"],["mn-MN","Mongolian"],
  ["ne-NP","Nepali"],["nb-NO","Norwegian"],["fa-IR","Persian"],["pl-PL","Polish"],
  ["pt-BR","Portuguese (Brazil)"],["pt-PT","Portuguese (Portugal)"],["pa-IN","Punjabi"],
  ["ro-RO","Romanian"],["ru-RU","Russian"],["sr-RS","Serbian"],["si-LK","Sinhala"],
  ["sk-SK","Slovak"],["sl-SI","Slovenian"],["es-ES","Spanish (Spain)"],["es-MX","Spanish (Mexico)"],
  ["es-US","Spanish (US)"],["sw-KE","Swahili"],["sv-SE","Swedish"],["ta-IN","Tamil"],
  ["te-IN","Telugu"],["th-TH","Thai"],["tr-TR","Turkish"],["uk-UA","Ukrainian"],["ur-PK","Urdu"],
  ["uz-UZ","Uzbek"],["vi-VN","Vietnamese"],["zu-ZA","Zulu"]
];

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const btn = document.getElementById('toggle');
const btnLabel = document.getElementById('btnLabel');
const srcLang = document.getElementById('srcLang');
const englishEl = document.getElementById('english');
const originalEl = document.getElementById('original');
const statusEl = document.getElementById('status');
const detectedEl = document.getElementById('detected');
const copyBtn = document.getElementById('copyBtn');
const clearBtn = document.getElementById('clearBtn');
const meterBar = document.getElementById('meterBar');
const meterHint = document.getElementById('meterHint');

const NAME_BY_CODE = {};
LANGS.forEach(([code,name]) => { NAME_BY_CODE[code.split('-')[0]] = name.replace(/\s*\(.*\)/,''); });
LANGS.forEach(([code,name]) => {
  const o = document.createElement('option'); o.value = code; o.textContent = name; srcLang.appendChild(o);
});
srcLang.value = "es-ES";

// ---- state ----
let recog = null;
let listening = false;
let isRunning = false;     // recognition session active
let starting = false;      // start() in flight
let restartTimer = null;   // periodic refresh
let watchdog = null;       // recovery loop
let finalQueue = Promise.resolve(); // serialize final translations (keeps order)
let liveSeq = 0;           // invalidates stale interim translations
let lastInterimSent = "";
let debounceTimer = null;
let englishCommitted = "";
let originalCommitted = "";
let liveEnglish = "";      // translation of current interim phrase

// mic meter
let audioCtx = null, analyser = null, micStream = null, meterRAF = null;

if (!SR) {
  statusEl.innerHTML = '<span class="err">This browser doesn\'t support speech recognition. Please use Google Chrome or Microsoft Edge on desktop.</span>';
  btn.disabled = true;
}

// AI translation via Google's neural endpoint. sl=auto => detects ANY language.
async function translate(text) {
  if (!text) return { translated: "", detected: "" };
  const url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=" + encodeURIComponent(text);
  const res = await fetch(url);
  if (!res.ok) throw new Error("translate http " + res.status);
  const data = await res.json();
  const translated = (data[0] || []).map(seg => seg[0]).join("");
  return { translated, detected: data[2] || "" };
}

function showDetected(code) {
  if (code) detectedEl.textContent = "detected: " + (NAME_BY_CODE[code] || code);
}

function renderEnglish() {
  englishEl.innerHTML = escapeHtml(englishCommitted) +
    (liveEnglish ? ' <span class="interim">' + escapeHtml(liveEnglish) + '</span>' : '');
}
function escapeHtml(s){ return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// ---------- mic level meter (separate stream, diagnostic only) ----------
async function startMeter() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    let quietFrames = 0;
    const loop = () => {
      analyser.getByteTimeDomainData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) { const v = (data[i]-128)/128; sum += v*v; }
      const rms = Math.sqrt(sum/data.length);
      const pct = Math.min(100, Math.round(rms*300));
      meterBar.style.width = pct + "%";
      if (pct < 4) { quietFrames++; } else { quietFrames = 0; }
      meterHint.textContent = pct < 4 ? (quietFrames > 120 ? "no sound — check mic" : "quiet") : "hearing you";
      meterRAF = requestAnimationFrame(loop);
    };
    loop();
    return true;
  } catch (e) {
    statusEl.innerHTML = '<span class="err">Microphone blocked or unavailable. Allow mic access and reload.</span>';
    return false;
  }
}
function stopMeter() {
  if (meterRAF) cancelAnimationFrame(meterRAF);
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close().catch(()=>{});
  micStream = null; audioCtx = null; analyser = null;
  meterBar.style.width = "0%"; meterHint.textContent = "idle";
}

// ---------- robust speech recognition ----------
function buildRecognizer() {
  const r = new SR();
  r.lang = (srcLang.value === "auto") ? (navigator.language || "en-US") : srcLang.value;
  r.continuous = true;
  r.interimResults = true;
  r.maxAlternatives = 1;

  r.onstart = () => {
    isRunning = true; starting = false;
    statusEl.textContent = "Listening… speak now.";
    // periodic refresh: Chrome silently goes deaf after ~1 min; cycle the session.
    clearTimeout(restartTimer);
    restartTimer = setTimeout(() => { try { r.stop(); } catch (_) {} }, 50000);
  };

  r.onresult = (event) => {
    let interim = "", finalChunk = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const result = event.results[i];
      if (result.isFinal) finalChunk += result[0].transcript;
      else interim += result[0].transcript;
    }

    // Commit finalized speech (translated in order via the queue).
    if (finalChunk.trim()) {
      const chunk = finalChunk.trim();
      originalCommitted = (originalCommitted + " " + chunk).trim();
      liveSeq++;            // invalidate any pending interim translation
      liveEnglish = "";
      finalQueue = finalQueue.then(async () => {
        try {
          const { translated, detected } = await translate(chunk);
          englishCommitted = (englishCommitted + " " + translated).trim();
          renderEnglish(); showDetected(detected);
        } catch (_) {}
      });
    }

    // Show live original immediately.
    originalEl.innerHTML = escapeHtml(originalCommitted) +
      (interim ? ' <span class="interim">' + escapeHtml(interim) + '</span>' : '');

    // LIVE translate the in-progress phrase (debounced) -> fixes the lag.
    const trimmedInterim = interim.trim();
    if (trimmedInterim && trimmedInterim !== lastInterimSent) {
      lastInterimSent = trimmedInterim;
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        const seq = ++liveSeq;
        translate(trimmedInterim).then(({ translated, detected }) => {
          if (seq !== liveSeq) return;     // a newer phrase/final superseded this
          liveEnglish = translated;
          renderEnglish(); showDetected(detected);
        }).catch(()=>{});
      }, 450);
    }
  };

  r.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted' || e.error === 'network') return; // let onend restart
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      statusEl.innerHTML = '<span class="err">Microphone permission denied. Allow it and reload.</span>';
      stop();
    } else {
      statusEl.innerHTML = '<span class="warn">Recovering (' + e.error + ')…</span>';
    }
  };

  r.onend = () => {
    isRunning = false;
    clearTimeout(restartTimer);
    if (listening) setTimeout(safeStart, 200); // immediate resume
  };
  return r;
}

function safeStart() {
  if (!listening || isRunning || starting) return;
  starting = true;
  try { recog.start(); }
  catch (_) { starting = false; } // "already started" — ignore, watchdog covers it
}

async function start() {
  listening = true;
  btn.classList.add('listening');
  btnLabel.textContent = "Stop";
  englishCommitted = ""; originalCommitted = ""; liveEnglish = ""; lastInterimSent = "";
  detectedEl.textContent = ""; englishEl.textContent = ""; originalEl.textContent = "";
  statusEl.textContent = "Starting microphone…";

  const ok = await startMeter();           // also prompts/permits the mic
  if (!ok) { stop(); return; }

  recog = buildRecognizer();
  safeStart();

  // Watchdog: if the engine dies and onend didn't relaunch it, force a restart.
  clearInterval(watchdog);
  watchdog = setInterval(() => {
    if (listening && !isRunning && !starting) safeStart();
  }, 2500);
}

function stop() {
  listening = false;
  btn.classList.remove('listening');
  btnLabel.textContent = "Translate";
  statusEl.textContent = "Stopped.";
  clearTimeout(restartTimer); clearInterval(watchdog); clearTimeout(debounceTimer);
  if (recog) { try { recog.stop(); } catch (_) {} }
  stopMeter();
}

btn.addEventListener('click', () => listening ? stop() : start());
copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(englishCommitted).then(() => { statusEl.textContent = "English copied."; });
});
clearBtn.addEventListener('click', () => {
  englishCommitted = ""; originalCommitted = ""; liveEnglish = ""; detectedEl.textContent = "";
  englishEl.textContent = ""; originalEl.textContent = "";
});
</script>
</body>
</html>
